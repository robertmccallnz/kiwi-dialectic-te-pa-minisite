<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Te Pā Tūwatawata</title>
  <link rel="canonical" href="https://te-pa.org/auth/login/" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/assets/kiwi-dialectic.css">
  <link rel="stylesheet" href="/assets/nav.css">
  <style>
    .auth-shell { max-width: 520px; margin: 80px auto 120px; padding: 0 24px; }
    .auth-shell h1 { font-family: 'Instrument Serif', serif; font-size: clamp(2.2rem, 5vw, 3rem); margin: 0 0 12px; }
    .lede { color: var(--fg-muted); margin: 0 0 32px; line-height: 1.6; }
    .form-card { background:#fff; border:1px solid var(--border, #e5e5e5); border-radius:14px; padding:32px; }
    .form-row { margin-bottom:18px; }
    .form-row label { display:block; font-weight:600; margin-bottom:6px; }
    .form-row input { width:100%; padding:12px 14px; border:1px solid #ddd; border-radius:10px; font-size:1rem; box-sizing:border-box; }
    .btn-primary { background: var(--accent, #c0392b); color:#fff; border:0; padding:14px 22px; border-radius:10px; font-weight:600; cursor:pointer; }
    .msg { padding:12px; border-radius:8px; margin-top:14px; font-size:.92rem; }
    .msg.ok  { background:#e8f6ea; border:1px solid #b9dfbe; color:#1f5224; }
    .msg.err { background:#fdecec; border:1px solid #f0bcbc; color:#7a1b1b; }
    .step { display:none; }
    .step.active { display:block; }
  </style>
</head>
<body>

<header class="site-nav">
  <a href="/" class="site-nav__logo">Te Pā Tūwatawata</a>
  <nav>
    <a href="/#modules">Modules</a>
    <a href="/learners/">Learners</a>
    <span data-te-pa-auth-slot></span>
  </nav>
</header>

<main class="auth-shell">
  <h1>Tomo anō — sign in</h1>
  <p class="lede">Enter your email — we'll send you a one-time sign-in link. New here? <a href="/auth/signup/">Create an account</a>.</p>

  <section class="step active" id="step-email">
    <div class="form-card">
      <form id="login-form">
        <div class="form-row">
          <label for="email">Email address</label>
          <input type="email" id="email" required autocomplete="email" placeholder="you@example.com" />
        </div>
        <button type="submit" class="btn-primary">Send sign-in link</button>
      </form>
      <div id="msg"></div>
    </div>
  </section>

  <section class="step" id="step-sent">
    <div class="form-card">
      <h2 style="margin-top:0">Check your inbox</h2>
      <p>Sign-in link sent to <strong id="sent-email"></strong>.</p>
    </div>
  </section>
</main>

<script>
  window.TE_PA_PUBLIC_CONFIG = window.TE_PA_PUBLIC_CONFIG || {
    supabaseUrl: 'TODO_SUPABASE_URL',
    supabaseAnonKey: 'TODO_SUPABASE_ANON_KEY'
  };
</script>
<script src="/assets/js/te-pa-auth.js"></script>
<script>
  const form = document.getElementById('login-form');
  const msg  = document.getElementById('msg');

  (async () => {
    const { user } = await window.TePa.getSession();
    if (user) window.location.href = '/profile/';
  })();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.innerHTML = '';
    const email = document.getElementById('email').value.trim();
    try {
      await window.TePa.sendMagicLink(email, '/profile/');
      document.getElementById('sent-email').textContent = email;
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById('step-sent').classList.add('active');
    } catch (err) {
      msg.innerHTML = `<div class="msg err">${err.message || 'Could not send link.'}</div>`;
    }
  });
</script>
</body>
</html>
