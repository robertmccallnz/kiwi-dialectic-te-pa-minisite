<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <!-- Background -->
  <rect width="1600" height="900" fill="#111111"/>
  <!-- Top accent line -->
  <rect x="0" y="0" width="1600" height="5" fill="#c0392b"/>
  <!-- Card border -->
  <rect x="48" y="48" width="1504" height="804" rx="24" fill="none" stroke="#f0efe9" stroke-opacity="0.1" stroke-width="1.5"/>

  <!-- Koru/fern decorative motif (abstract spiral) -->
  <circle cx="1420" cy="480" r="200" fill="none" stroke="#c0392b" stroke-opacity="0.15" stroke-width="60"/>
  <circle cx="1420" cy="480" r="120" fill="none" stroke="#c0392b" stroke-opacity="0.12" stroke-width="40"/>
  <circle cx="1420" cy="480" r="60" fill="none" stroke="#c0392b" stroke-opacity="0.1" stroke-width="20"/>

  <!-- Brand tag -->
  <text x="110" y="148" font-family="Arial, Helvetica, sans-serif" font-size="22" letter-spacing="4" fill="#f0efe9" fill-opacity="0.5" text-transform="uppercase">THE KIWI DIALECTIC</text>

  <!-- Divider -->
  <rect x="110" y="170" width="60" height="3" fill="#c0392b"/>

  <!-- Main heading line 1 -->
  <text x="110" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="108" fill="#f0efe9" font-weight="normal">AI must not become</text>

  <!-- Main heading line 2 -->
  <text x="110" y="430" font-family="Georgia, 'Times New Roman', serif" font-size="108" fill="#f0efe9" font-weight="normal">a new machine for</text>

  <!-- Main heading line 3 — accent colour -->
  <text x="110" y="550" font-family="Georgia, 'Times New Roman', serif" font-size="108" fill="#c0392b" font-weight="normal">stealing Māori data.</text>

  <!-- Sub-text -->
  <text x="110" y="650" font-family="Georgia, 'Times New Roman', serif" font-size="36" fill="#f0efe9" fill-opacity="0.6" font-style="italic">Te Pā Tūwatawata — six modules on AI &amp; Māori data sovereignty</text>

  <!-- URL -->
  <text x="110" y="810" font-family="Arial, Helvetica, sans-serif" font-size="24" letter-spacing="1" fill="#f0efe9" fill-opacity="0.4">kiwidialectic.com</text>
</svg>
