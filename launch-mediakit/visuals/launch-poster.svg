<text x="397.0" y="820" font-size="24" fill="#d4a544" letter-spacing="2" font-weight="700">AI IS THE NEW RAUPATU.</text>
<text x="397.0" y="864" font-size="17" fill="#9a9080">Big Tech trains on our voices, our faces,</text>
<text x="397.0" y="888" font-size="17" fill="#9a9080">our waiata — without consent.</text>
<text x="397.0" y="932" font-size="20" fill="#f4f0e8" font-weight="700">Take the free course.</text>
<text x="397.0" y="960" font-size="20" fill="#f4f0e8" font-weight="700">Teach the kit. Stick the stickers.</text>
