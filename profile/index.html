<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My profile — Te Pā Tūwatawata</title>
  <link rel="canonical" href="https://te-pa.org/profile/" />
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/assets/kiwi-dialectic.css">
  <link rel="stylesheet" href="/assets/nav.css">
  <style>
    .shell { max-width: 920px; margin: 60px auto 120px; padding: 0 24px; }
    h1 { font-family:'Instrument Serif',serif; font-size: clamp(2.2rem,5vw,3rem); margin:0 0 6px; }
    .public-link { font-family:'Work Sans',sans-serif; color: var(--fg-muted); margin:0 0 32px; font-size:.95rem; }
    .public-link a { color: var(--accent2, #1f6bb8); }
    .card { background:#fff; border:1px solid #e5e5e5; border-radius:14px; padding:28px; margin-bottom:28px; }
    .card h2 { font-family:'Instrument Serif',serif; margin:0 0 18px; font-size: 1.7rem; }
    .badges { display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:18px; }
    .badge { text-align:center; opacity:.25; filter:grayscale(1); transition: all .25s ease; }
    .badge.earned { opacity:1; filter:none; }
    .badge img { width:120px; height:120px; }
    .badge .name { font-family:'Work Sans',sans-serif; font-size:.85rem; font-weight:600; margin-top:8px; line-height:1.3; }
    .badge .module { font-size:.78rem; color: var(--fg-muted); }
    .form-row { margin-bottom:16px; }
    .form-row label { display:block; font-weight:600; margin-bottom:6px; }
    .form-row input, .form-row textarea { width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:8px; font-family:inherit; font-size:.95rem; box-sizing:border-box; }
    .form-row textarea { min-height:80px; }
    .check-row { display:flex; gap:10px; align-items:flex-start; margin:14px 0; }
    .btn { background: var(--accent, #c0392b); color:#fff; border:0; padding:12px 18px; border-radius:8px; font-weight:600; cursor:pointer; }
    .btn--secondary { background:#444; }
    .msg { padding:10px 12px; border-radius:8px; font-size:.9rem; margin-top:12px; }
    .msg.ok { background:#e8f6ea; border:1px solid #b9dfbe; color:#1f5224; }
    .msg.err { background:#fdecec; border:1px solid #f0bcbc; color:#7a1b1b; }
    #loading { padding:40px 0; text-align:center; color: var(--fg-muted); }
  </style>
</head>
<body>

<header class="site-nav">
  <a href="/" class="site-nav__logo">Te Pā Tūwatawata</a>
  <nav>
    <a href="/#modules">Modules</a>
    <a href="/learners/">Learners</a>
    <a href="#" id="signout-btn">Sign out</a>
  </nav>
</header>

<main class="shell">
  <div id="loading">Loading your profile…</div>

  <div id="profile-content" style="display:none">
    <h1 id="display-name"></h1>
    <p class="public-link" id="public-link"></p>

    <section class="card">
      <h2>Your pou tohu</h2>
      <p style="color: var(--fg-muted); margin:0 0 24px; font-size:.95rem">
        Each badge is earned by completing the matching module. Faded ones are still ahead of you.
      </p>
      <div class="badges" id="badges-grid"></div>
    </section>

    <section class="card">
      <h2>Edit your profile</h2>
      <form id="profile-form">
        <div class="form-row">
          <label for="display_name">Display name</label>
          <input type="text" id="display_name" maxlength="60" required />
        </div>
        <div class="form-row">
          <label for="pepeha">Pepeha or short bio</label>
          <textarea id="pepeha" maxlength="500"></textarea>
        </div>
        <div class="check-row">
          <input type="checkbox" id="profile_public" />
          <label for="profile_public">
            Make my badge page public at <code id="public-slug"></code>.
          </label>
        </div>
        <button type="submit" class="btn">Save changes</button>
      </form>
      <div id="msg"></div>
    </section>
  </div>

  <div id="not-signed-in" style="display:none">
    <h1>Not signed in</h1>
    <p><a href="/auth/login/">Sign in</a> or <a href="/auth/signup/">create an account</a>.</p>
  </div>
</main>

<script>
  window.TE_PA_PUBLIC_CONFIG = window.TE_PA_PUBLIC_CONFIG || {
    supabaseUrl: 'TODO_SUPABASE_URL',
    supabaseAnonKey: 'TODO_SUPABASE_ANON_KEY'
  };

  // Module → motif map (matches the 6 motifs locked in for badges)
  const MODULES = [
    { n: 1, name: 'Whakapapa o te raraunga', motif: 'koru' },
    { n: 2, name: 'Te Pā Tūwatawata hei tauira', motif: 'pa-palisade' },
    { n: 3, name: 'AI me te raupatu matihiko', motif: 'niho-taniwha' },
    { n: 4, name: 'Tikanga, ture, mana whakahaere', motif: 'kowhaiwhai' },
    { n: 5, name: 'Hoahoa tika', motif: 'unaunahi' },
    { n: 6, name: 'He anamata rangatira', motif: 'takarangi' },
  ];
  const BADGE_PNG = (n) => `/assets/badges/te-pa-module-${n}-en.png`;
</script>
<script src="/assets/js/te-pa-auth.js"></script>
<script>
  (async () => {
    const me = await window.TePa.myProfile();
    if (!me?.learner) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('not-signed-in').style.display = 'block';
      return;
    }
    const { learner, completions } = me;
    const earnedSet = new Set(completions.map(c => c.module_number));

    document.getElementById('display-name').textContent = learner.display_name;
    const publicUrl = `${location.origin}/learners/${learner.slug}/`;
    document.getElementById('public-link').innerHTML = learner.profile_public
      ? `Public profile: <a href="/learners/${learner.slug}/">${publicUrl}</a>`
      : `Profile is private. <a href="#" id="make-public">Make public</a>.`;
    document.getElementById('public-slug').textContent = `/learners/${learner.slug}/`;
    document.getElementById('display_name').value = learner.display_name;
    document.getElementById('pepeha').value = learner.pepeha || '';
    document.getElementById('profile_public').checked = !!learner.profile_public;

    // Render badge grid
    const grid = document.getElementById('badges-grid');
    grid.innerHTML = MODULES.map(m => `
      <div class="badge ${earnedSet.has(m.n) ? 'earned' : ''}">
        <img src="${BADGE_PNG(m.n)}" alt="${m.name}" loading="lazy"/>
        <div class="module">Module ${m.n}</div>
        <div class="name">${m.name}</div>
      </div>
    `).join('');

    document.getElementById('loading').style.display = 'none';
    document.getElementById('profile-content').style.display = 'block';
  })();

  document.getElementById('profile-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = document.getElementById('msg');
    msg.innerHTML = '';
    try {
      await window.TePa.updateProfile({
        display_name: document.getElementById('display_name').value.trim(),
        pepeha: document.getElementById('pepeha').value.trim(),
        profile_public: document.getElementById('profile_public').checked,
      });
      msg.innerHTML = '<div class="msg ok">Saved.</div>';
    } catch (err) {
      msg.innerHTML = `<div class="msg err">${err.message}</div>`;
    }
  });

  document.getElementById('signout-btn').addEventListener('click', async (e) => {
    e.preventDefault();
    await window.TePa.signOut();
    window.location.href = '/';
  });
</script>

</body>
</html>
